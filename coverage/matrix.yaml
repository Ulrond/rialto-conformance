  - prop: video-mime-to-caps
    interface: rialtomsevideosink
    tier: core
    path: mse
    req: [RC-CORE-MSECAPS-004]
    expected: "advertised video caps are within the documented mapping; sink advertises video/x-h264 (baseline)"
    case: "L1CapsTests.VideoMimeToCapsMappingCorrect"
    status: covered

  - prop: subtitle-mime-to-caps
    interface: rialtomsesubtitlesink
    tier: core
    path: mse
    req: [RC-CORE-MSECAPS-005]
    expected: "advertised subtitle caps are within the documented mapping (subtitle support is platform-variable)"
    case: "L1CapsTests.SubtitleMimeToCapsMappingCorrect"
    status: covered

  - prop: caps-event-field-parsing
    interface: RialtoMSEBaseSink
    tier: core
    path: mse
    req: [RC-CORE-MSECAPS-006]
    expected: "incoming CAPS-event fields are parsed (codec_data, alignment, stream-format, Dolby-Vision, raw-audio layout/format)"
    # AVC-form H.264 (stream-format=avc, alignment=au, SPS/PPS out-of-band in
    # codec_data) fed through rialtomsevideosink: an AVC stream is undecodable
    # without codec_data, so reaching PLAYING is field-sensitive proof the sink
    # parsed codec_data/stream-format/alignment out of the CAPS event and applied
    # them to the source. H.264 is baseline-required, so this runs unconditionally.
    # DV (dovi-stream/dv_profile) routes through the H.265 source branch and needs
    # real DV content on a DV-capable platform (codecs.video.dolbyVision + #22);
    # raw-audio layout/format is likewise content-variable — both ride with #22.
    case: "L4SinkCapsDataPathTests.AvcCapsFieldsParsedReachingPlaying"
    status: covered

