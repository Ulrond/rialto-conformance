# --- Known coverage gaps (surfacing unmet requirements is a primary point, §5)-
gaps:
  - req: [RC-EXT-DRM-FPS-001]
    tier: extended
    path: native
    surface: "IMediaKeys / IMediaKeysCapabilities"
    detail: >
      An extended conformance requirement covers the com.apple.fps key system.
      IMediaKeysCapabilities::getSupportedKeySystems advertises Widevine and
      PlayReady (com.widevine.alpha, com.microsoft.playready) but not
      com.apple.fps. FPS is a flagged coverage gap and a backlog item (add the
      FPS key system to Rialto/OCDM).
    status: gap
