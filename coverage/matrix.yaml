    # AVC-form H.264 (stream-format=avc, alignment=au, SPS/PPS out-of-band in
    # codec_data) fed through rialtomsevideosink: an AVC stream is undecodable
    # without codec_data, so reaching PLAYING is field-sensitive proof the sink
    # parsed codec_data/stream-format/alignment out of the CAPS event and applied
