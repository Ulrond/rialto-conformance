#
# Requirements-derived coverage record & traceability (§5).
#
# The versioned matrix. Each cell ties a global media-playback conformance
# requirement (suite-owned `RC-*` id) to the Rialto surface it drives and the
# conformance case that proves it. Axes are
# property×path, codec×path, op×path — never container (HLS/DASH demux is above
# Rialto) and never platform (platform applicability is the capability gate,
# profiles/, not a matrix axis).
#
# `req:` lists the conformance requirement ids this cell satisfies. The ids are
# self-contained and source-neutral: they name what the interface must do, not
# where the requirement originated. The provenance of an EXTENDED id (which
# upstream certification programme it traces to) lives only in the private
# requirements feed mounted at coverage/requirements/ — never in this record.
#
# tier:  core     — interface-conformance, derived from the Rialto external
#                   interface contract itself. The CORE set is the drop-in /
#                   transform-safety gate: a new Rialto must uphold the same
#                   external contract as the old one. Run first; must be green.
#        extended — app/player-requirement conformance (Phase 2), layered on top.
#
# path:  native (Surface B, public client API) | mse (Surface A, rialtomse*sink)
#        | both (a consistency case asserting the two surfaces agree)
#
# A requirement is surface-neutral. Where the same backend fact is exposed on
# both surfaces it appears as one row PER path — same RC id, two cases — plus a
# `path: both` consistency row that asserts the two surfaces agree. Tests are
# never path-agnostic: each case drives exactly one surface as itself.
#
# status: covered | planned | gap (requirement unmet by Rialto today)
#
# Phase 0 seeds the schema and the smoke-case rows. L1→L4 ingestion fills it out.

schemaVersion: 2
# The Rialto release this record targets (framework.lock pin). NOT Rialto's binary
# ABI (fixed per release) — it is the release the suite is validated against.
targetRialtoRelease: "v0.22.3"

# --- Operations (the IMediaPipeline / IMediaKeys / IWebAudioPlayer functions) -
operations:
  - op: createFactory
    interface: "IControl / IMediaPipeline / IMediaPipelineCapabilities / IMediaKeys / IMediaKeysCapabilities / IWebAudioPlayer"
    tier: core
    path: native
    req: [RC-CORE-FACTORY-001]
    expected: "Every public createFactory() returns a non-null factory"
    case: "L1FactoryTests.EveryPublicFactoryIsNonNull"
    status: covered

  - op: createMediaKeys
    interface: IMediaKeysFactory
    tier: core
    path: native
    req: [RC-CORE-FACTORY-002]
    expected: "Returns null (not a partial object) for a key system no backend supports"
    case: "L1FactoryTests.CreateMediaKeysReturnsNullForUnsupportedKeySystem"
    status: covered

  - op: registerClient
    interface: IControl
    tier: core
    path: native
    req: [RC-CORE-CONTROL-001]
    expected: "Returns true and writes the current ApplicationState into its out-param"
    case: "L1ControlTests.RegisterClientReturnsTrueAndWritesState"
    status: covered

  - op: notifyApplicationState
    interface: IControlClient
    tier: core
    path: native
    req: [RC-CORE-CONTROL-002]
    expected: "A registered client is informed of the live server application state (RUNNING)"
    case: "L1ControlTests.RegisteredClientLearnsRunningState"
    status: covered
    # The current state is delivered to a registering client via the
    # registerClient out-param; the notifyApplicationState callback delivers
    # subsequent transitions. This case verifies the former (client learns
    # RUNNING); the transition-callback clause is the row below (#14).

  - op: notifyApplicationState
    interface: IControlClient
    tier: core
    path: native
    req: [RC-CORE-CONTROL-002]
    expected: "A registered client receives notifyApplicationState on a server application-state transition (RUNNING->INACTIVE->RUNNING)"
    case: "L1ControlTests.RegisteredClientIsNotifiedOfStateTransition"
    status: covered
    # The registration out-param covers the initial state; this covers the
    # callback on a *subsequent* transition. The gate activates the server before
    # the client connects, so the case provokes the edge itself: it drives the app
    # INACTIVE then ACTIVE through the ServerManagerSim (SimControl) while
    # registered and asserts the client observed each edge. Gated on the
    # `control.stateToggle` platform feature — only a gate controlling its own sim
    # can drive the transition, so it self-skips on real hardware (#14).

  - op: "~IControl"
    interface: IControl
    tier: core
    path: native
    req: [RC-CORE-CONTROL-003]
    expected: "The held client shared_ptr is released on IControl destruction"
    case: "L1ControlTests.ClientReleasedOnControlDestruction"
    status: covered

  - op: getSupportedMimeTypes
    interface: IMediaPipelineCapabilities
    tier: core
    path: native
    req: [RC-CORE-CAPS-001]
    expected: "Reports the MSE mime types the target supports for a source type"
    case: "L1CapabilitiesTests.BaselineVideoMimeTypeSupportIsConsistent"
    status: covered

  - op: isMimeTypeSupported
    interface: IMediaPipelineCapabilities
    tier: core
    path: native
    req: [RC-CORE-CAPS-001]
    expected: "Agrees with getSupportedMimeTypes for a queried codec"
    case: "L1CapabilitiesTests.BaselineVideoMimeTypeSupportIsConsistent"
    status: covered

  - op: isVideoMaster
    interface: IMediaPipelineCapabilities
    tier: core
    path: native
    req: [RC-CORE-CAPS-002]
    expected: "Returns status and writes the video-master out-param"
    case: "L1CapabilitiesTests.IsVideoMasterReportsStatus"
    status: covered

  - op: getSupportedMimeTypes
    interface: IMediaPipelineCapabilities
    tier: core
    path: native
    req: [RC-CORE-CAPS-004]
    expected: "Per-source-type list for AUDIO/VIDEO/SUBTITLE; VIDEO+AUDIO non-empty (baseline H.264/AAC)"
    case: "L1CapabilitiesTests.SupportedMimeTypesPerSourceType"
    status: covered

  - op: getSupportedProperties
    interface: IMediaPipelineCapabilities
    tier: core
    path: native
    req: [RC-CORE-CAPS-003]
    expected: "Returns subset of queried names; unknown name never returned; UNKNOWN = union of AUDIO+VIDEO"
    case: "L1CapabilitiesTests.SupportedPropertiesContract"
    status: covered

  - op: getSupportedKeySystems
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-001]
    expected: "Capabilities singleton obtainable; supported-key-systems query callable"
    case: "L1KeysCapabilitiesTests.CapabilitiesObtainable"
    status: covered

  - op: supportsKeySystem
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-002]
    expected: "Agrees with getSupportedKeySystems; any string is a legal query, unsupported -> false"
    case: "L1KeysCapabilitiesTests.SupportsKeySystemConsistentWithList"
    status: covered

  - op: getSupportedKeySystemVersion
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-003]
    expected: "Writes a version and returns true for a supported system; unsupported -> false"
    case: "L1KeysCapabilitiesTests.SupportedKeySystemVersionContract"
    status: covered

  - op: isServerCertificateSupported
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-004]
    expected: "Legal query for any key system; unsupported -> false, not an error"
    case: "L1KeysCapabilitiesTests.ServerCertificateQueryIsLegal"
    status: covered

  - op: supportsKeySystem
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-002]
    expected: "A declared ClearKey system (org.w3.clearkey) reports as supported"
    case: "L1KeysCapabilitiesTests.ClearKeySupportedWhenDeclared"
    status: covered
    # Gated on the `drm.clearkey` platform feature. Exercises the positive
    # supportsKeySystem path against the software platform's ClearKey OpenCDM
    # backend (backends/opencdm/clearkey); self-skips where ClearKey is undeclared.

  - op: getSupportedKeySystemVersion
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-003]
    expected: "A declared ClearKey system reports a non-empty version"
    case: "L1KeysCapabilitiesTests.ClearKeyReportsVersion"
    status: covered
    # Gated on `drm.clearkey`. Exercises the positive version path against the
    # ClearKey backend (the generic case only reaches the unsupported->false leg
    # where the platform advertises no key systems).

  - op: isServerCertificateSupported
    interface: IMediaKeysCapabilities
    tier: core
    path: native
    req: [RC-CORE-KEYSCAP-004]
    expected: "ClearKey is supported but certificate-less -> reports false"
    case: "L1KeysCapabilitiesTests.ClearKeyHasNoServerCertificate"
    status: covered
    # Gated on `drm.clearkey`. Distinguishes the false a supported-but-
    # certificate-less system returns from the false an unsupported system returns.

  - op: createClientLogControl
    interface: IClientLogControl
    tier: core
    path: native
    req: [RC-CORE-LOG-001]
    expected: "Factory non-null; createClientLogControl() returns the singleton (same instance)"
    case: "L1ClientLogControlTests.FactoryReturnsSingleton"
    status: covered

  - op: registerLogHandler
    interface: IClientLogControl
    tier: core
    path: native
    req: [RC-CORE-LOG-002]
    expected: "Returns true; handler.log() receives records with a defined Level + populated file/function/message"
    case: "L1ClientLogControlTests.HandlerReceivesPopulatedRecords"
    status: covered

  - op: registerLogHandler
    interface: IClientLogControl
    tier: core
    path: native
    req: [RC-CORE-LOG-003]
    expected: "Registering a new handler replaces the previous; the new handler receives records"
    case: "L1ClientLogControlTests.RegisteringNewHandlerReplacesPrevious"
    status: covered

  - op: registerLogHandler
    interface: IClientLogControl
    tier: core
    path: native
    req: [RC-CORE-LOG-004]
    expected: "registerLogHandler(nullptr) cancels delivery; no further log() callbacks"
    case: "L1ClientLogControlTests.NullHandlerCancelsDelivery"
    status: covered

  # --- IMediaPipeline (Surface B native) -------------------------------------
  # Create + client-binding introspection (green on the software platform). The
  # rest of the IMediaPipeline surface — transport (attachSource /
  # allSourcesAttached / play / seek / flush), per-source properties, AND the
  # position/duration/buffering getters below — only returns a value once a source
  # is attached and the backend media pipeline is realized. getPosition is now
  # covered by driving a real AAC source to PLAYING over the software render / data
  # path (#18); the remaining getters stay `planned` for the follow-on data-path
  # cases.
  - op: createMediaPipeline
    interface: IMediaPipelineFactory
    tier: core
    path: native
    req: [RC-CORE-PIPE-001]
    expected: "createMediaPipeline(client, VideoRequirements) returns a usable instance bound to the client"
    case: "L1PipelineTests.CreateReturnsInstance"
    status: covered

  - op: getClient
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-002]
    expected: "getClient returns the client supplied at creation"
    case: "L1PipelineTests.GetClientReturnsSuppliedClient"
    status: covered

  # Transport + playback state machine — driven over the software render / data
  # path (#18): a real AAC source is loaded, attached, and taken through
  # play/pause/stop against the live server (MediaFeed). The state-transition rows
  # assert both the synchronous return and the PlaybackState notification the
  # transition produces; that notification sequence is the one Rialto's own
  # component tests encode (see coverage/interface-definition-gaps.md IDG-004),
  # asserted as the CORE transform-safety contract.
  - op: load
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-003]
    expected: "load(MSE, mimeType, url, isLive) returns true for a supported source type"
    case: "L4PipelineTransportDataPathTests.LoadAndAttachAssignRetrievableSourceId"
    status: covered

  - op: attachSource
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-004]
    expected: "attachSource is valid for MediaType::MSE and assigns a source id retrievable via MediaSource::getId()"
    case: "L4PipelineTransportDataPathTests.LoadAndAttachAssignRetrievableSourceId"
    status: covered

  - op: removeSource
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-005]
    expected: "removeSource(id) returns true for a previously attached source id"
    case: "L4PipelineTransportDataPathTests.RemoveSourceSucceedsForAttachedSource"
    status: covered

  - op: allSourcesAttached
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-006]
    expected: "allSourcesAttached must precede streaming and may be called only once; the first call returns true, a second returns false"
    case: "L4PipelineTransportDataPathTests.AllSourcesAttachedIsLegalOnlyOnce"
    status: covered

  - op: play
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-007]
    expected: "play(async) returns true; backend notifies PlaybackState::PLAYING and sets the async out-param"
    case: "L4PipelineTransportDataPathTests.PlayPauseStopStateMachine"
    status: covered

  - op: pause
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-008]
    expected: "pause() returns true, must not block, and notifies PlaybackState::PAUSED"
    case: "L4PipelineTransportDataPathTests.PlayPauseStopStateMachine"
    status: covered

  - op: stop
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-009]
    expected: "stop() returns true and must not block; the STOPPED notification is observed-if-delivered (not guaranteed on a live backend)"
    case: "L4PipelineTransportDataPathTests.PlayPauseStopStateMachine"
    status: covered
    # The STOPPED notification rides a GStreamer bus state-changed(NULL) message
    # that the pipeline's default auto-flush-bus races against: set_state(NULL) is
    # synchronous and flushes the bus while the server's dispatcher polls it, so on
    # a live pipeline the message is usually dropped. Rialto's own component tests
    # only observe STOPPED via a mocked gst wrapper injecting the message. The
    # synchronous MUST contract is asserted; the notification clause is logged,
    # not asserted — see coverage/interface-definition-gaps.md IDG-005.

  - op: setPlaybackRate
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-010]
    expected: "setPlaybackRate(rate) returns true for a backend-supported rate (applied once PLAYING; postponed below)"
    case: "L4PipelineTransportDataPathTests.SetPlaybackRateSucceedsWhilePlaying"
    status: covered

  - op: setPosition
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-011]
    expected: "Before start: sets the start position and returns true. After start: seeks without blocking; backend notifies SEEKING then SEEK_DONE"
    case: "L4PipelineTransportDataPathTests.SetPositionSetsStartThenSeeksWhilePlaying"
    status: covered

  - op: getPosition
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-012]
    expected: "Synchronous: returns true and writes the position"
    case: "L4PlaybackDataPathTests.GetPositionSucceedsOncePlaying"
    status: covered

  - op: getDuration
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-013]
    expected: "Synchronous: returns true and writes the duration when the duration is determinable; returns false (not determinable) for a stream source whose duration the pipeline does not carry"
    case: "L4PlaybackDataPathTests.GetDurationNotDeterminableForStreamSource"
    status: covered
    # getDuration is gst_element_query_duration(pipeline, GST_FORMAT_TIME) — true +
    # value on success, false when the duration is not determinable. In Rialto's MSE
    # model every source is fed by a stream-type appsrc with no total length and no
    # public/IPC way to set one (MediaSource carries only per-segment duration), and
    # duration is owned by the app, signalled out of band via the client's
    # notifyDuration sentinels (kDurationUnknown/kDurationUnending, RC-CORE-DATA-011).
    # So getDuration correctly returns false for an attached, playing MSE stream
    # source. The case proves this is the contract-correct "not determinable" answer,
    # not a broken pipeline: getPosition succeeds on the same playing pipeline while
    # getDuration returns false. The positive leg (true + finite duration) is NOT
    # applicable to the MSE source model — it needs a container/demuxer source with a
    # known length that Rialto's public API does not expose — so it is not covered
    # here by design, not left planned.

  - op: getStats
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-014]
    expected: "Synchronous: writes rendered and dropped frame counts for a source id"
    case: "L4PlaybackDataPathTests.GetStatsSucceedsOncePlaying"
    status: covered

  - op: "setBufferingLimit / getBufferingLimit"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-029]
    expected: "setBufferingLimit is accepted; the value round-trips where the audio decoder exposes limit-buffering-ms, else getBufferingLimit answers false"
    case: "L4PipelineAuxDataPathTests.BufferingLimitConformsWhenSupported"
    status: covered
    # limit-buffering-ms is a vendor audio-DECODER property (absent from the
    # software avdec_aac), so the round-trip leg conforms-when-supported — the
    # same pattern as the server-conditional sink properties (MSEPROP-005/008).
    # Empirical (software platform): set returns true, get returns false.

  - op: "setUseBuffering / getUseBuffering"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-030]
    expected: "Round-trips the buffering-messages flag on the realized pipeline (write applies asynchronously; read polled)"
    case: "L4PipelineAuxDataPathTests.UseBufferingRoundTrips"
    status: covered
    # use-buffering lives on the audio decodebin (standard GStreamer), so it
    # round-trips on every platform; the server applies the write on its worker
    # thread, so a read-back must poll rather than read immediately.

  - op: setVideoWindow
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-015]
    expected: "setVideoWindow accepts pixel x/y/width/height and returns true"
    case: "L4PipelineAuxDataPathTests.SetVideoWindowAcceptsGeometry"
    status: covered

  - op: "setVolume / getVolume"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-017, RC-CORE-PIPE-018]
    expected: "setVolume accepts a target in [0.0, 1.0] and returns true; getVolume returns true and reads the level back (write applies asynchronously; read polled)"
    case: "L4PipelineAuxDataPathTests.VolumeRoundTripsOnRealizedPipeline"
    status: covered

  - op: "setMute / getMute"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-019]
    expected: "Round-trip the mute flag per source"
    case: "L4PipelineAuxDataPathTests.MuteRoundTripsPerSource"
    status: covered

  - op: flush
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-025]
    expected: "flush(sourceId, resetTime, async) returns true and the client receives notifySourceFlushed(sourceId)"
    case: "L4PipelineAuxDataPathTests.FlushEmitsSourceFlushed"
    status: covered

  - op: setSourcePosition
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-026]
    expected: "Sets a per-source start position (appliedRate, stopPosition honoured) on the realized pipeline"
    case: "L4PipelineAuxDataPathTests.SetSourcePositionSucceeds"
    status: covered

  - op: processAudioGap
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-028]
    expected: "Handles an audio gap (audioAac flag) and returns true on the realized pipeline"
    case: "L4PipelineAuxDataPathTests.ProcessAudioGapSucceeds"
    status: covered

  - op: renderFrame
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-032]
    expected: "Requests rendering of a prerolled frame and returns true once the player is loaded"
    case: "L4PipelineAuxDataPathTests.RenderFrameSucceedsOnceLoaded"
    status: covered

  - op: setLowLatency
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-021]
    expected: "setLowLatency returns true (accepted); application is a vendor audio-sink property with no getter, conform-when-supported"
    case: "L4PipelineAuxDataPathTests.SetLowLatencyIsAccepted"
    status: covered

  - op: "setSync / getSync"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-022]
    expected: "Round-trip the clock-sync flag (standard GstBaseSink property; write applies asynchronously, read polled)"
    case: "L4PipelineAuxDataPathTests.SyncRoundTrips"
    status: covered

  - op: setSyncOff
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-023]
    expected: "setSyncOff before the pipeline reaches PLAYING returns true (accepted); vendor audio-sink property, no getter"
    case: "L4PipelineAuxDataPathTests.SetSyncOffAcceptedBeforePlaying"
    status: covered

  - op: "setStreamSyncMode / getStreamSyncMode"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-024]
    expected: "Round-trip the stream-sync mode where the audio sink exposes the property, else the getter answers false"
    case: "L4PipelineAuxDataPathTests.StreamSyncModeConformsWhenSupported"
    status: covered
    # stream-sync-mode is a vendor audio-sink property (absent from the software
    # fake sink) — conform-when-supported, like the buffering limit (PIPE-029).

  - op: switchSource
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-031]
    expected: "A new audio source description supplied mid-playback is accepted (returns true)"
    case: "L4PipelineAuxDataPathTests.SwitchSourceAcceptsNewAudioSource"
    status: covered

  - op: "setImmediateOutput / getImmediateOutput"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-016]
    expected: "Round-trip the immediate-output flag per source"
    case: "(needs a native VIDEO source — the property lives on the video sink; ride with the native video feed (MediaSegmentVideo over generateH264AvcStream) planned for the DATA batch)"
    status: planned

  - op: "setTextTrackIdentifier / getTextTrackIdentifier"
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-020]
    expected: "Round-trip the subtitle text-track identifier"
    case: "(needs a SUBTITLE source + a platform text-track service; the software platform stubs TextTrackPluginWrapper — platform-variable, ride with a subtitle-capable target)"
    status: planned

  - op: setSubtitleOffset
    interface: IMediaPipeline
    tier: core
    path: native
    req: [RC-CORE-PIPE-027]
    expected: "Applies a ns offset to a subtitle source"
    case: "(needs a SUBTITLE source — same dependency as PIPE-020)"
    status: planned

  # --- IWebAudioPlayer (Surface B native) ------------------------------------
  - op: createWebAudioPlayer
    interface: IWebAudioPlayerFactory
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-001]
    expected: "createWebAudioPlayer(\"audio/x-raw\", priority, pcm config) returns an instance in IDLE"
    case: "L1WebAudioTests.CreateReturnsInstance"
    status: covered

  - op: "play / pause / setEos"
    interface: IWebAudioPlayer
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-002]
    expected: "IDLE->PLAYING/PAUSED->END_OF_STREAM and notifyState reports each transition"
    case: "L1WebAudioTests.StateMachineNotifiesTransitions"
    status: covered
    # Gated on the `webaudio.playout` platform feature: driving PLAYING renders
    # through the backend audio device, which the headless software platform does
    # not provide, so this leg self-skips there and runs where a target declares
    # web-audio play-out.

  - op: getBufferAvailable
    interface: IWebAudioPlayer
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-003]
    expected: "Reports the writeable frames, bounded by the shm capacity; a write at that bound is accepted"
    case: "L1WebAudioTests.GetBufferAvailableBoundsTheWrite"
    status: covered

  - op: getBufferDelay
    interface: IWebAudioPlayer
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-004]
    expected: "Writes the number of frames still to be played (zero when nothing is queued)"
    case: "L1WebAudioTests.GetBufferDelayReportsQueuedFrames"
    status: covered

  - op: getDeviceInfo
    interface: IWebAudioPlayer
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-005]
    expected: "Writes preferred/maximum commit frames + supportDeferredPlay; preferred <= maximum"
    case: "L1WebAudioTests.GetDeviceInfoReportsBufferSizing"
    status: covered

  - op: "setVolume / getVolume"
    interface: IWebAudioPlayer
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-006]
    expected: "Round-trips a level in [0.0, 1.0]"
    case: "L1WebAudioTests.VolumeRoundTrips"
    status: covered

  - op: createWebAudioPlayer
    interface: IWebAudioPlayerFactory
    tier: core
    path: native
    req: [RC-CORE-WEBAUDIO-007]
    expected: "A player created with priority above the supported count still creates and appears to function (audio silently discarded)"
    case: "L1WebAudioTests.HighPriorityPlayerAppearsToFunction"
    status: covered

# --- Properties (sink/decoder properties) × path ------------------------------
properties:
  - prop: element-registration
    tier: core
    path: mse
    req: [RC-CORE-MSE-001]
    expected: "rialtomse{audio,video,subtitle}sink registered under documented names"
    case: "L1SinkRegistrationTests.VideoSinkRegistered, L1SinkRegistrationTests.AudioSinkRegistered"
    status: covered

  - prop: element-registration-rank-gated
    tier: core
    path: mse
