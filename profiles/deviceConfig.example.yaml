#
# EXAMPLE deviceConfig (python_raft device-config shape) — HOST-ONLY.
#
# This is the template a deployment copies to raft/device_config.yml and edits
# per target. It carries python_raft's orchestration inputs (connection, install
# location) and NAMES the platform's Hardware Feature Profile (HFP) by URL. It is
# read on the host only.
#
# deviceConfig does NOT carry the capability gate. The gate lives in the HFP — a
# separate, platform-specific, platform-owned file named by `conformance.hfp`.
# The host fetches the HFP from that URL and hands the resolved file to the
# on-target binary with `-p`; the target consumes the HFP and never reads this
# deviceConfig. HFP schema + template: hfp.schema.yaml / hfp.example.yaml.

deviceConfig:
  cpe1:
    platform: "reference"     # config-named target instance — not a SoC family
    model: "reference"
    prompt: "root@target:~#"

    # Host orchestration + the pointer to this platform's HFP. The host fetches
    # the HFP from `hfp` and ships the resolved file to `installDir`; nothing on
    # the target reads this deviceConfig.
    conformance:
      installDir: "/opt/rialto-conformance"       # where the package is installed
      binary:     "rialto_conformance"
      resultsDir: "/opt/rialto-conformance/results"
      hfp: "https://<platform-owner>/hfp/reference.yaml"   # URL of THIS platform's HFP
