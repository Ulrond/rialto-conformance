#
# deviceConfig for the LINUX software platform (python_raft device-config shape)
# — HOST-ONLY.
#
# Linux is treated as just another platform: the backend underneath is the
# software Rialto built by ../build-rialto.sh (NATIVE_BUILD), not a SoC. This
# deviceConfig carries python_raft's orchestration inputs and points at the Linux
# software platform's HFP (profiles/hfp.linux.yaml) via a file:// URL.
#
# deviceConfig does NOT carry the capability gate — that is the HFP. The host
# fetches the HFP named by `conformance.hfp` and loads it into the on-target
# binary with `-p`. For a direct local run against the software stack, load the
# HFP itself:
#   RIALTO_CONFORMANCE_TIER=core ./build/bin/rialto_conformance -a \
#       -p profiles/hfp.linux.yaml

deviceConfig:
  cpe1:
    platform: "linux-native"        # the Linux software platform (not a SoC family)
    model: "native-software"
    prompt: "$ "

    conformance:
      installDir: "/opt/rialto-conformance"
      binary:     "rialto_conformance"
      resultsDir: "/opt/rialto-conformance/results"
      hfp: "file://profiles/hfp.linux.yaml"        # the Linux software platform's HFP
