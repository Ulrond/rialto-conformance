#
# deviceConfig schema — HOST-ONLY (python_raft device-config shape).
#
# A deviceConfig follows python_raft's device-config convention:
#     deviceConfig: > cpe1: > platform: / model: / prompt:
# (see python_raft examples/configs/example_device_config.yml). It is read on the
# HOST only: python_raft uses it to drive the target and to install + collect
# results. It does NOT carry the capability gate and it is NOT shipped to the
# target.
#
# The capability gate is the platform's Hardware Feature Profile (HFP), a separate
# platform-specific file named here by `conformance.hfp` (a URL). The host fetches
# the HFP and loads it into the on-target binary with `-p`. HFP schema + keys:
# hfp.schema.yaml.
#
# Value types noted.

deviceConfig:
  cpe1:                       # one CPE per deviceConfig (the target this run drives)
    platform: string          # config-named target instance — NOT a SoC family
    model: string
    prompt: string            # console prompt (raft)

    # Host orchestration + the pointer to this platform's HFP.
    conformance:
      installDir: string      # where the package is installed on the target
      binary: string          # the on-target binary name (rialto_conformance)
      resultsDir: string      # where xUnit/JUnit results are written on the target
      hfp: string             # URL of this platform's HFP (http(s):// or file://).
                              # The host fetches it and loads it with -p; the gate
                              # keys live in the HFP, not here.
