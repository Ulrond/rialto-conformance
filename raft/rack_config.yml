#
# python_raft rack config (the --config argument). Defines the physical
# infrastructure: the target inventory and how to reach each console. raft is
# GIVEN the target by this config (rack + slot) and has NO concept of the
# platform — the backend is swapped by config/build, never by editing tests.
#
# Run:
#   python raft/suites/test_rialto_conformance.py \
#       --config raft/rack_config.yml --rack rack1 --slotName reference-target
#
# The `platform` field in each slot's device entry links to device_config.yml,
# which names the per-target capability profile shipped to that target. Slot
# names are config-named target instances — NOT SoC families; the suite never
# branches on platform identity.

globalConfig:
  includes:
    deviceConfig: "device_config.yml"
  local:
    log:
      directory: "./logs"

rackConfig:
  rack1:
    # One slot per available target. Selected by --slotName. The platform is not
    # relevant to the suite — only the console reaches the box and the device
    # entry names which capability profile to ship.
    reference-target:
      devices:
        - dut:
            platform: "reference-target"
            consoles:
              - default:
                  type: "ssh"
                  enabled: true
                  ip: "192.0.2.10"
                  port: 22
                  username: "root"
                  prompt: "root@target:~#"

    lab-target-1:
      devices:
        - dut:
            platform: "lab-target-1"
            consoles:
              - default:
                  type: "ssh"
                  enabled: true
                  ip: "192.0.2.20"
                  port: 22
                  username: "root"
                  prompt: "root@target:~#"
