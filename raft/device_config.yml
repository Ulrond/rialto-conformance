#
# python_raft device config (auto-loaded via rack_config includes, or
# --deviceConfig) — the canonical python_raft shape:
#     deviceConfig: > cpe1: > platform: / model: / prompt:
#
# HOST-ONLY. python_raft reads platform/model/prompt to drive the target and the
# `conformance` block to install + collect results. The capability gate is NOT
# here — it is the platform's HFP, named by `conformance.hfp` (a URL). The host
# fetches the HFP and ships the resolved file to the target, which loads it with
# `-p`. Nothing on the target reads this deviceConfig.
#
# raft is GIVEN the target by config and has NO concept of the platform; the
# suite never branches on platform identity. Swapping the backend = editing this
# config (and pointing `hfp` at that platform's HFP), never the tests. Schema:
# ../profiles/deviceConfig.schema.yaml. HFP schema: ../profiles/hfp.schema.yaml.

deviceConfig:
  cpe1:
    platform: "reference-target"   # config-named target instance — not a SoC family
    model: "reference"
    prompt: "root@target:~#"

    # Host orchestration + the pointer to this platform's HFP. ut-raft installs
    # the package + collects results here, fetches the HFP from `hfp`, and ships
    # the resolved file to the target.
    conformance:
      installDir: "/opt/rialto-conformance"
      binary: "rialto_conformance"
      resultsDir: "/opt/rialto-conformance/results"
      hfp: "https://<platform-owner>/hfp/reference-target.yaml"   # URL of this platform's HFP
